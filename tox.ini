[tox]
minversion = 3.2.0
envlist = py3,pep8

[testenv]
allowlist_externals =
  find
setenv =
  OS_STDOUT_CAPTURE={env:OS_STDOUT_CAPTURE:1}
  OS_STDERR_CAPTURE={env:OS_STDERR_CAPTURE:1}
  OS_TEST_TIMEOUT={env:OS_TEST_TIMEOUT:60}
deps =
  -c{env:TOX_CONSTRAINTS_FILE:https://releases.openstack.org/constraints/upper/master}
  -r{toxinidir}/test-requirements.txt
  -r{toxinidir}/requirements.txt
  -r{toxinidir}/doc/requirements.txt
commands =
  find . -type f -name "*.pyc" -delete
  stestr run --suppress-attachments {posargs}
  stestr slowest

[testenv:pep8]
description =
  Run style checks.
deps =
  pre-commit
  {[testenv:mypy]deps}
commands =
  pre-commit run -a
  {[testenv:mypy]commands}

[testenv:mypy]
description =
  Run type checks.
deps =
  {[testenv]deps}
  mypy
  types-docutils
  types-requests
commands =
  mypy --cache-dir="{envdir}/mypy_cache" -p oslo_config {posargs}

[testenv:cover]
setenv =
    PYTHON=coverage run --source oslo_config --parallel-mode
commands =
  coverage erase
  {[testenv]commands}
  coverage combine
  coverage html -d cover
  coverage xml -o cover/coverage.xml
  coverage report --show-missing

[testenv:venv]
commands = {posargs}

[testenv:docs]
allowlist_externals = rm
deps =
  -c{env:TOX_CONSTRAINTS_FILE:https://releases.openstack.org/constraints/upper/master}
  -r{toxinidir}/doc/requirements.txt
commands =
  rm -fr doc/build
  sphinx-build -W --keep-going -b html -j auto doc/source doc/build/html {posargs}

[testenv:releasenotes]
allowlist_externals =
  rm
deps = {[testenv:docs]deps}
commands =
  rm -rf releasenotes/build
  sphinx-build -W --keep-going -b html -j auto releasenotes/source releasenotes/build/html {posargs}

[hacking]
import_exceptions =
  collections.abc
  oslo_config._i18n
  typing

[flake8]
show-source = True
# We only enable the hacking (H) checks
select = H
exclude = .tox,dist,doc,*.egg,build
